<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Bulk Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --card: #1a1916;
    --card2: #222119;
    --accent: #e8a427;
    --text: #f0ead8;
    --muted: #7a7362;
    --protein: #4fa87a;
    --border: #2e2c27;
    --done-bg: #141f18;
    --done-border: #1e3528;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 36px 20px 60px;
  }

  .page { max-width: 680px; margin: 0 auto; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 32px; }

  .date-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(232,164,39,0.35);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 9vw, 72px);
    letter-spacing: 0.04em;
    line-height: 0.95;
    color: var(--text);
  }
  h1 span { color: var(--accent); }

  /* PROGRESS */
  .progress-wrap {
    margin: 24px 0 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
  }

  .progress-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--protein), var(--accent));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .reset-btn {
    margin-top: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--muted); color: var(--text); }

  /* MEAL ROWS */
  .meals { display: flex; flex-direction: column; gap: 10px; }

  .meal-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.3s, background 0.3s;
  }

  .meal-section.all-done {
    border-color: var(--done-border);
    background: var(--done-bg);
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .check-item:hover { background: rgba(255,255,255,0.025); }
  .meal-section.all-done .check-item:hover { background: rgba(79,168,122,0.04); }

  .cb {
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .check-item.checked .cb {
    background: var(--protein);
    border-color: var(--protein);
  }

  .cb-tick { width: 12px; height: 8px; opacity: 0; transition: opacity 0.15s; }
  .check-item.checked .cb-tick { opacity: 1; }

  .meal-info { flex: 1; min-width: 0; }

  .meal-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }

  .meal-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .meal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .check-item.checked .meal-name { color: var(--protein); }

  .meal-detail {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.5;
    transition: opacity 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .check-item.checked .meal-detail { opacity: 0.45; text-decoration: line-through; }

  .meal-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 3px;
    letter-spacing: 0.06em;
  }

  .badge-cal {
    background: rgba(232,164,39,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,164,39,0.2);
  }

  .badge-p {
    background: rgba(79,168,122,0.1);
    color: var(--protein);
    border: 1px solid rgba(79,168,122,0.2);
  }

  /* COMPLETE BANNER */
  .complete-banner {
    display: none;
    margin-top: 20px;
    background: linear-gradient(135deg, #1a2e22, #152519);
    border: 1px solid var(--done-border);
    border-radius: 10px;
    padding: 22px 24px;
    text-align: center;
  }

  .complete-banner.show { display: block; }

  .complete-banner h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.06em;
    color: var(--protein);
    margin-bottom: 4px;
  }

  .complete-banner p {
    font-size: 13px;
    color: var(--muted);
  }

  /* TOTALS */
  .totals {
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .totals-label {
    padding: 11px 18px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .totals-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--card);
  }

  .total-cell {
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .total-cell:last-child { border-right: none; }

  .total-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .total-val.orange { color: var(--accent); }
  .total-val.green { color: var(--protein); }
  .total-val.muted { color: #e05c4a; }

  .total-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-top: 4px;
  }

  @media (max-width: 480px) {
    .totals-grid { grid-template-columns: 1fr; }
    .total-cell { border-right: none; border-bottom: 1px solid var(--border); }
    .total-cell:last-child { border-bottom: none; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="date-tag" id="dateTag">Loading...</div>
    <h1>Bulk <span>Day</span><br>Checklist</h1>
  </div>

  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">Meals eaten today</span>
      <span class="progress-count" id="progressCount">0 / 20</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <button class="reset-btn" onclick="resetDay()">↺ Reset today</button>
  </div>

  <div class="meals" id="mealsList"></div>

  <div class="complete-banner" id="completeBanner">
    <h2>Day Complete 🔥</h2>
    <p>~2900 kcal · ~155g protein · nailed it</p>
  </div>

  <div class="totals">
    <div class="totals-label">Daily Targets</div>
    <div class="totals-grid">
      <div class="total-cell"><div class="total-val orange">~2900</div><div class="total-label">Calories</div></div>
      <div class="total-cell"><div class="total-val green">~155g</div><div class="total-label">Protein</div></div>
      <div class="total-cell"><div class="total-val muted">~110g</div><div class="total-label">Fat</div></div>
    </div>
  </div>

</div>

<script>
const MEALS = [
  {
    id: "breakfast",
    time: "7:30 AM",
    name: "Protein Oat Bowl",
    cal: "~720 kcal",
    protein: "~45g P",
    ingredients: [
      { name: "Rolled oats (dry)", amount: "100g" },
      { name: "Whole milk", amount: "300ml" },
      { name: "Whey protein powder", amount: "30g (1 scoop)" },
      { name: "Honey", amount: "20g" },
      { name: "Milo cereal", amount: "30g" },
    ]
  },
  {
    id: "snack1",
    time: "11:00 AM",
    name: "Desk Snack",
    cal: "~420 kcal",
    protein: "~28g P",
    ingredients: [
      { name: "Greek yogurt / dahi", amount: "250g" },
      { name: "Honey", amount: "15g" },
      { name: "Pub mix nuts", amount: "40g" },
    ]
  },
  {
    id: "lunch",
    time: "1:00 PM",
    name: "Butter Chicken Paneer",
    cal: "~750 kcal",
    protein: "~42g P",
    ingredients: [
      { name: "Paneer (cubed)", amount: "200g" },
      { name: "Butter chicken jar sauce", amount: "150g" },
      { name: "Garlic naan", amount: "1 piece" },
    ]
  },
  {
    id: "snack2",
    time: "4:00 PM",
    name: "Paneer & Yogurt Snack",
    cal: "~400 kcal",
    protein: "~27g P",
    ingredients: [
      { name: "Paneer (room temp)", amount: "100g" },
      { name: "Greek yogurt / dahi", amount: "150g" },
      { name: "Honey", amount: "15g" },
      { name: "Pub mix nuts", amount: "30g" },
    ]
  },
  {
    id: "dinner",
    time: "7:30 PM",
    name: "Big Paneer Naan Dinner",
    cal: "~670 kcal",
    protein: "~20g P",
    ingredients: [
      { name: "Paneer (cubed)", amount: "150g" },
      { name: "Butter chicken jar sauce", amount: "150g" },
      { name: "Garlic naan", amount: "2 pieces" },
      { name: "Greek yogurt (raita side)", amount: "100g" },
    ]
  }
];

const TOTAL_ITEMS = MEALS.length;
const STORAGE_KEY = "bulk_checklist_v3";

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const data = JSON.parse(raw);
    return data[todayKey()] || {};
  } catch { return {}; }
}

function saveState(checked) {
  try {
    const today = todayKey();
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : {};
    const keys = Object.keys(data).sort();
    if (keys.length > 6) delete data[keys[0]];
    data[today] = checked;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}
}

let checked = loadState();

function render() {
  const now = new Date();
  document.getElementById("dateTag").textContent = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  const container = document.getElementById("mealsList");
  container.innerHTML = "";

  MEALS.forEach(meal => {
    const done = !!checked[meal.id];
    const section = document.createElement("div");
    section.className = "meal-section" + (done ? " all-done" : "");
    section.innerHTML = `
      <div class="check-item${done ? ' checked' : ''}" onclick="toggle('${meal.id}')">
        <div class="cb">
          <svg class="cb-tick" viewBox="0 0 10 7" fill="none">
            <path d="M1 3.5L3.5 6L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="meal-info">
          <div class="meal-top">
            <span class="meal-time">${meal.time}</span>
            <span class="meal-name">${meal.name}</span>
          </div>
        </div>
        <div class="meal-right">
          <span class="badge badge-cal">${meal.cal}</span>
          <span class="badge badge-p">${meal.protein}</span>
        </div>
      </div>
      <ul class="ing-list">
        ${meal.ingredients.map(ing => `
          <li class="ing-row">
            <span class="ing-name">${ing.name}</span>
            <span class="ing-amount">${ing.amount}</span>
          </li>
        `).join('')}
      </ul>
    `;
    container.appendChild(section);
  });

  updateProgress();
}

function toggle(id) {
  checked[id] = !checked[id];
  saveState(checked);
  render();
}

function resetDay() {
  checked = {};
  saveState(checked);
  render();
}

function updateProgress() {
  const done = Object.values(checked).filter(Boolean).length;
  const pct = Math.round((done / TOTAL_ITEMS) * 100);
  document.getElementById("progressCount").textContent = `${done} / ${TOTAL_ITEMS}`;
  document.getElementById("progressFill").style.width = pct + "%";
  const banner = document.getElementById("completeBanner");
  banner.classList.toggle("show", done === TOTAL_ITEMS);
}

render();
</script>
</body>
</html>
